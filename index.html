<!DOCTYPE html>

<head>
	<title>wngugiephy</title>
	<meta charset="utf-8">

	<!-- bootstrap css -->
	<link rel="stylesheet" type="text/css" href="bower_components/bootstrap/dist/css/bootstrap.min.css">

		 /*for the fixed-top navbar*/

	<!--#########-->

	<!-- hover css -->
	<link rel="stylesheet" type="text/css" href="bower_components/hover/css/hover.css">

	<!-- animate -->
	<link rel="stylesheet" type="text/css" href="bower_components/animate.css/animate.css">
	<!--#########-->

	<!-- fonts -->
	<link rel="stylesheet" type="text/css" href="http://fonts.googleapis.com/css?family=Roboto:Light300">
    <style type="text/css">
      body {
        font-family: 'Roboto', serif;

      }

      div.container-fluid {
      	padding-bottom: 10px;
      }

      /*full screen section*/
      div.header {
      	/*background-image: url(assets/img/bg.jpg); */
      	background-color: #5bfce8;
		height: 100vh;
		
		background-size: cover;
		margin-top:0;
		display: flex;
		flex-direction:column;
		justify-content:center;
		align-items:center;
		box-shadow: 0px 1px 15px #888888;
      }

      div.shadowed {
        box-shadow: 0px 1px 15px #888888;
        padding-bottom: 15px;
        padding-top: 15px;
        margin-bottom: 10px;
      }

      div.grey {
      	background-color: #d2d2d2;
      }

      div.light-grey {
      	background-color: #e4e4e4;
      }

      div.white {
      	background-color: #c8fff8;
      }

      div.cyan {
      	background-color: #5bfce8;
      }

      div.round-shadow {
        box-shadow: 0px 1px 5px #888888;
        border-radius: 0%;
        padding: 15px 15px 15px 15px;
        background-color: #bebebe;
        
      }

      img.img-shadowed {
        box-shadow: 0px 1px 5px #888888;

      }

      h1 {
      	color: #ffffff;
      }
    </style>

		-flash
		-bounce
		-fadeInDown
		-fadeInRight
		-fadeInLeft
	 -->
	

	<div class="header">
		<div class="animated pulse">
			<div class="col-lg-6 col-lg-offset-3 col-md-6 col-md-offset-3 col-sm-6 col-sm-offset-3 col-xs-6 col-xs-offset-3" align="center">
				<img src="assets/img/header/ngugiephy-header.png" class="img-responsive hvr-grow" width="600px">
				<br><br><br><br>
			</div>
		</div>
		<div class="wow bounce" data-wow-iteration="infinite" data-wow-duration="2s" align="center">
			<div class="col-lg-6 col-lg-offset-3 col-md-6 col-md-offset-3 col-sm-6 col-sm-offset-3 col-xs-6 col-xs-offset-3" align="center">
				
				<img src="assets/img/header/scroll-arrow.png" class="img-responsive" width="120px">

			</div>
		</div>
	</div>    

    <!-- MAIN CONTENT -->
	<!-- ************ -->
	<!-- ************ -->
	<!-- ************ -->
	<div class="container-fluid">
		<!-- ****** first row ************* -->
		
		<!-- ****** first row end ********* -->

		<!-- ****** second row ************* -->
		<div class="row cyan" align="center">
			<div class="col-lg-8 col-lg-offset-2 col-md-8 col-md-offset-2 col-sm-8 col-sm-offset-2 col-xs-10 col-xs-offset-1 shadowed white">
				<div class="col-lg-4 col-md-4 col-sm-4 col-xs-12">
					<div class="wow fadeInLeft">
						<a href="">
							<div class="round-shadow">
								<img src="assets/img/main/art.png" class="hvr-grow" width="100px" ><br>
							</div>
						</a>
					</div>
				</div>
				<div class="col-lg-4 col-md-4 col-sm-4 col-xs-12">
					<div class="wow fadeInDown">
						<a href="">
							<div class="round-shadow">
								<img src="assets/img/main/eng.png" class="hvr-grow" width="100px" ><br>
							</div>
						</a>
					</div>
				</div>
				<div class="col-lg-4 col-md-4 col-sm-4 col-xs-12">
					<div class="wow fadeInRight">
						<a href="">
							<div class="round-shadow">
								<img src="assets/img/main/abt.png" class="hvr-grow" width="100px" ><br>
							</div>
						</a>
					</div>
				</div>
			</div>
			
		</div>
		<!-- ****** second row end ********* -->
