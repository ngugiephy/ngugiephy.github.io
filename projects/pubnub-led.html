  <body>
    <div class="container-fuid">
      <div class="row">
        <div class="col-lg-6 col-lg-offset-3 col-md-6 col-md-offset-3 col-sm-6 col-sm-offset-3 col-xs-12" align="center">
          <h1>PUBNUB-LED_BLINK</h1>
          <button class="btn btn-default btn-lg hvr-grow">lights on!</button>
          <br>
          <hr>
          <h2 class="wow pulse" data-wow-iteration="infinite">TESTING IN PROGRESS 2.0</h2>
          <hr>
        </div>
      </div>
    </div>
    

    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="../bower_components/bootstrap/dist/js/bootstrap.min.js"></script>
    
    <!--  PUBNUB JS  -->
    <script src="http://cdn.pubnub.com/pubnub-3.7.1.min.js"></script>
    
    <script> //click event handler
      (function(){
        //DOM
        var button = document.querySelector('button');
        
        //channel name being subscribed to
        var channel = 'led-lights';
        
        //init
        var p = PUBNUB.init({
          subscribe_key: 'demo'
          publish_key: 'demo'
        });
        
        //sending data
        function led-lights(){
          p.publish({
            channel : channel,
            message : {led:1}
          });
        }
        
        //click event
        button.addEventListener('click', led-lights)
        
      })();
    
      //var channel = 'led-lights'

      //  publish_key: 'pub-c-1afde382-1404-4079-9139-8196509ba945'
      //});
      
      //now we publish that the button has been pressed
      //document.querySelector('button').assEventListener('click', function(){
      //  p.publish({
      //    channel: channel,
      //    message: {led: 1} //we have the trigger here
      //  });
      //}, false);
    </script>

    <!-- wowjs -->
    <script type="text/javascript" src="../bower_components/wow/dist/wow.min.js"></script>

      new WOW().init();
